[project]
name = "rl3-feedback-widget"
version = "0.1.13"
description = "RL3 in-app feedback widget — async-only FastAPI router + SQLModel tables + Alembic migrations + S3/SMTP integrated."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "UNLICENSED" }
authors = [{ name = "RL3 AI Agency" }]

dependencies = [
    "fastapi>=0.115",
    "sqlmodel>=0.0.22",
    "sqlalchemy[asyncio]>=2.0.36",
    "psycopg[binary]>=3.2",
    "alembic>=1.14",
    "pydantic[email]>=2.10",
    "pydantic-settings>=2.7",
    "boto3>=1.35",
    "aiosmtplib>=3.0",
    "jinja2>=3.1",
    "python-multipart>=0.0.18",
    "typer>=0.13",
    "structlog>=24.4",
    "python-jose[cryptography]>=3.3.0",
    "rich>=13.0",
]

[project.scripts]
feedback-widget = "feedback_widget.cli:app"

[project.optional-dependencies]
test = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "httpx>=0.28",
    "asgi-lifespan>=2.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/feedback_widget"]

[tool.hatch.build.targets.wheel.force-include]
"src/feedback_widget/email/templates" = "feedback_widget/email/templates"
"src/feedback_widget/alembic" = "feedback_widget/alembic"
"src/feedback_widget/alembic.ini" = "feedback_widget/alembic.ini"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra --strict-markers"
